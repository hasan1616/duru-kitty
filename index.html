<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duru İçin ✦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Nunito:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a0d2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; background:white; animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); }
  @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:.9} }
  .container { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:20px; padding:24px; }
  h1 { font-family:'Pixelify Sans',monospace; font-size:22px; color:#ffb3d9; letter-spacing:2px; text-align:center; animation:fadeIn 1s ease; }
  svg { animation: float 4s ease-in-out infinite, fadeIn 1s ease; cursor:pointer; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes fadeIn { from{opacity:0;transform:scale(.9) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .palette { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; animation:fadeIn 1.2s ease; }
  .swatch { width:40px; height:40px; border-radius:8px; cursor:pointer; border:3px solid transparent; transition:transform .15s,border-color .15s; }
  .swatch:hover { transform:scale(1.15); }
  .swatch.active { border-color:white; transform:scale(1.15); }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <h1>duru için ✦</h1>

  <svg id="kitty" width="300" height="340" viewBox="0 0 340 380">
    <rect width="340" height="380" fill="#1a0d2e" rx="16"/>

    <!-- sol kulak -->
    <rect x="90"  y="44"  width="16" height="8"  fill="white"/>
    <rect x="82"  y="52"  width="16" height="8"  fill="white"/>
    <rect x="74"  y="60"  width="24" height="16" fill="white"/>
    <rect x="82"  y="56"  width="8"  height="8"  data-role="p2"/>

    <!-- sağ kulak -->
    <rect x="234" y="44"  width="16" height="8"  fill="white"/>
    <rect x="242" y="52"  width="16" height="8"  fill="white"/>
    <rect x="242" y="60"  width="24" height="16" fill="white"/>
    <rect x="250" y="56"  width="8"  height="8"  data-role="p2"/>

    <!-- kafa -->
    <rect x="82"  y="72"  width="176" height="104" fill="white"/>
    <rect x="74"  y="80"  width="192" height="88"  fill="white"/>
    <rect x="66"  y="88"  width="208" height="72"  fill="white"/>

    <!-- gözler -->
    <rect x="106" y="108" width="20" height="20" fill="#1a1a1a"/>
    <rect x="214" y="108" width="20" height="20" fill="#1a1a1a"/>
    <rect x="108" y="110" width="8"  height="8"  fill="white"/>
    <rect x="216" y="110" width="8"  height="8"  fill="white"/>

    <!-- burun -->
    <rect x="162" y="142" width="16" height="10" fill="#ffcc00"/>

    <!-- bıyıklar -->
    <rect x="82"  y="146" width="68" height="3" fill="#aaa" opacity=".6"/>
    <rect x="82"  y="154" width="60" height="3" fill="#aaa" opacity=".4"/>
    <rect x="190" y="146" width="68" height="3" fill="#aaa" opacity=".6"/>
    <rect x="198" y="154" width="60" height="3" fill="#aaa" opacity=".4"/>

    <!-- fiyonk -->
    <g id="petals">
      <rect x="196" y="68"  width="28" height="8"  data-role="p1"/>
      <rect x="204" y="76"  width="20" height="8"  data-role="p1"/>
      <rect x="204" y="84"  width="16" height="8"  data-role="p2"/>
      <rect x="256" y="68"  width="28" height="8"  data-role="p1"/>
      <rect x="256" y="76"  width="20" height="8"  data-role="p1"/>
      <rect x="260" y="84"  width="16" height="8"  data-role="p2"/>
      <rect x="224" y="68"  width="32" height="24" data-role="p1"/>
      <rect x="228" y="72"  width="24" height="16" data-role="p2"/>
      <rect x="234" y="76"  width="12" height="8"  data-role="p3"/>
    </g>

    <!-- gövde -->
    <rect x="90"  y="192" width="160" height="88" fill="white"/>
    <rect x="82"  y="200" width="176" height="72" fill="white"/>
    <rect x="74"  y="208" width="192" height="56" fill="white"/>

    <!-- eller -->
    <rect x="50"  y="224" width="24" height="32" fill="white"/>
    <rect x="42"  y="232" width="16" height="24" fill="white"/>
    <rect x="266" y="224" width="24" height="32" fill="white"/>
    <rect x="282" y="232" width="16" height="24" fill="white"/>

    <!-- ayaklar -->
    <rect x="98"  y="278" width="56" height="20" fill="white"/>
    <rect x="90"  y="288" width="64" height="16" fill="white"/>
    <rect x="186" y="278" width="56" height="20" fill="white"/>
    <rect x="186" y="288" width="64" height="16" fill="white"/>

    <!-- kuyruk -->
    <rect x="266" y="264" width="16" height="8"  fill="white"/>
    <rect x="274" y="272" width="16" height="8"  fill="white"/>
    <rect x="282" y="280" width="16" height="8"  fill="white"/>
    <rect x="282" y="288" width="16" height="8"  fill="white"/>
    <rect x="274" y="296" width="16" height="8"  fill="white"/>

  </svg>

  <div class="palette" id="palette"></div>
</div>

<script>
const pals = [
  { name:'Pembe',   bg:'#1a0d2e', p1:'#ff4da6', p2:'#ff85c2', p3:'#ffb3d9', dot:'#ff4da6' },
  { name:'Kırmızı', bg:'#1a0005', p1:'#ff1744', p2:'#ff5983', p3:'#ffb3c1', dot:'#ff1744' },
  { name:'Mor',     bg:'#0e0a1e', p1:'#a855f7', p2:'#c084fc', p3:'#e9d5ff', dot:'#a855f7' },
  { name:'Mavi',    bg:'#00091a', p1:'#1e90ff', p2:'#63b3ff', p3:'#b3d9ff', dot:'#1e90ff' },
  { name:'Sarı',    bg:'#1a1200', p1:'#e8c800', p2:'#f5e060', p3:'#fffab3', dot:'#e8c800' },
  { name:'Yeşil',   bg:'#001a0a', p1:'#00c853', p2:'#69f0ae', p3:'#ccffe0', dot:'#00c853' },
];

let cur = 0;

function applyPal(idx) {
  cur = idx;
  const p = pals[idx];
  document.body.style.background = p.bg;
  document.querySelector('#kitty rect').setAttribute('fill', p.bg);
  document.querySelectorAll('#kitty [data-role]').forEach(r => {
    const role = r.getAttribute('data-role');
    if (p[role]) r.setAttribute('fill', p[role]);
  });
  document.querySelectorAll('.swatch').forEach((s,i) => s.classList.toggle('active', i===idx));
  document.getElementById('kitty').style.filter = `drop-shadow(0 0 24px ${p.p1}88)`;
}

const palette = document.getElementById('palette');
pals.forEach((p, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i===0?' active':'');
  sw.title = p.name;
  sw.style.background = p.dot;
  sw.addEventListener('click', () => applyPal(i));
  palette.appendChild(sw);
});

const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() < 0.3 ? 3 : 2;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

applyPal(0);
</script>
</body>
</html>
